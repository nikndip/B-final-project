{{define "base"}}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="bg-gray-50">
    {{if .UseShell}}
    <div class="min-h-screen bg-gray-50 {{if .ShowNav}}pb-20{{end}}">
      <div class="max-w-md mx-auto bg-white min-h-screen container-shadow">
        {{template "flash" .}}
        {{render .ContentTemplate .}}
      </div>
    </div>
    {{else}}
    {{template "flash" .}}
    {{render .ContentTemplate .}}
    {{end}}

    {{if .ShowNav}}
      {{template "nav" .}}
    {{end}}
  </body>
</html>
{{end}}
