{{define "content.exercise_library"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-blue-600 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Библиотека упражнений</h1>
    </div>
    <p class="text-blue-100 text-sm">Подберите упражнения по категории и сложности</p>
  </div>

  <div class="p-4 space-y-4">
    <form method="GET" action="/exercise-library" class="bg-white rounded-2xl p-4 shadow-sm space-y-3">
      <div>
        <label class="text-xs text-gray-600" for="q">Поиск</label>
        <input id="q" name="q" value="{{.Query}}" class="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200" placeholder="Название упражнения" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-600" for="category">Категория</label>
          <input id="category" name="category" value="{{.Category}}" class="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200" placeholder="Спина, Кор, Растяжка" />
        </div>
        <div>
          <label class="text-xs text-gray-600" for="difficulty">Сложность</label>
          <input id="difficulty" name="difficulty" value="{{.Difficulty}}" class="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200" placeholder="Легкая" />
        </div>
      </div>
      <button class="w-full bg-blue-600 text-white py-2 rounded-xl">Применить</button>
    </form>

    <div class="space-y-3">
      {{range .Exercises}}
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1">
            <h3 class="mb-1">{{.Name}}</h3>
            <div class="flex items-center gap-2 text-xs text-gray-500 mb-2">
              <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-full">{{.Category}}</span>
              <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-full">{{.Difficulty}}</span>
            </div>
            <p class="text-sm text-gray-600 mb-3">{{.Description}}</p>
            <div class="flex items-center gap-4 text-sm text-gray-600">
              <span>{{.Sets}} подхода</span>
              <span>{{.Reps}}</span>
            </div>
          </div>
          <a href="/exercises/{{.ID}}" class="text-blue-600 text-sm">Подробнее</a>
        </div>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
