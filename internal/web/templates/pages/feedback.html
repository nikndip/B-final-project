{{define "content.feedback"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Отзыв</h1>
    </div>
    <p class="text-blue-100 text-sm">Поделитесь впечатлениями о тренировке</p>
  </div>

  <div class="p-4 space-y-4">
    <form method="POST" action="/feedback" class="bg-white rounded-2xl p-5 shadow-sm space-y-3">
      <input type="hidden" name="session" value="{{.SessionID}}" />
      <div>
        <label class="text-xs text-gray-500" for="rating">Оценка (1-5)</label>
        <input id="rating" name="rating" type="number" min="1" max="5" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" required />
      </div>
      <div>
        <label class="text-xs text-gray-500" for="comment">Комментарий</label>
        <textarea id="comment" name="comment" rows="4" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200"></textarea>
      </div>
      <button class="w-full bg-blue-600 text-white py-3 rounded-xl">Отправить</button>
    </form>

    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h3 class="mb-3">Последние отзывы</h3>
      <div class="space-y-3">
        {{range .Feedbacks}}
        <div class="p-4 rounded-xl bg-gray-50">
          <div class="flex items-center justify-between mb-2">
            <div class="text-sm font-medium">{{.Workout}}</div>
            <div class="text-xs text-gray-500">{{.Created}}</div>
          </div>
          <div class="text-sm text-gray-600 mb-2">Оценка: {{.Rating}}</div>
          <p class="text-sm text-gray-600">{{.Comment}}</p>
        </div>
        {{end}}
      </div>
    </div>
  </div>
</div>
{{end}}
