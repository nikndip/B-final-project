{{define "content.goals"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-gradient-to-br from-purple-600 to-blue-600 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Цели</h1>
    </div>
    <p class="text-purple-100 text-sm">Поставьте цели и отслеживайте прогресс</p>
  </div>

  <div class="p-4 space-y-4">
    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h3 class="mb-4">Добавить цель</h3>
      <form method="POST" action="/goals" class="space-y-3">
        <div>
          <label class="text-xs text-gray-500" for="title">Название</label>
          <input id="title" name="title" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Например: 10 тренировок" />
        </div>
        <div>
          <label class="text-xs text-gray-500" for="description">Описание</label>
          <textarea id="description" name="description" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" rows="3"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500" for="target_date">Дата</label>
            <input id="target_date" name="target_date" type="date" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" value="{{.Today}}" />
          </div>
          <div>
            <label class="text-xs text-gray-500" for="category">Категория</label>
            <select id="category" name="category" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200">
              <option value="strength">Сила</option>
              <option value="flexibility">Гибкость</option>
              <option value="endurance">Выносливость</option>
              <option value="weight">Вес</option>
              <option value="other">Другое</option>
            </select>
          </div>
        </div>
        <button class="w-full bg-purple-600 text-white py-3 rounded-xl">Добавить</button>
      </form>
    </div>

    <div class="space-y-3">
      {{range .Goals}}
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="mb-1">{{.Title}}</h3>
            <p class="text-sm text-gray-600">{{.Description}}</p>
            <p class="text-xs text-gray-400 mt-1">Срок: {{.TargetDate}}</p>
          </div>
          <div class="text-sm text-purple-600">{{.Progress}}%</div>
        </div>
        <div class="mt-3 h-2 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-full bg-purple-500" style="width: {{.Progress}}%;"></div>
        </div>
        <form method="POST" action="/goals/progress" class="mt-3 flex gap-2">
          <input type="hidden" name="id" value="{{.ID}}" />
          <input type="number" name="progress" min="0" max="100" value="{{.Progress}}" class="flex-1 px-3 py-2 rounded-lg border border-gray-200" />
          <button class="px-4 py-2 bg-gray-900 text-white rounded-lg">Обновить</button>
        </form>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
