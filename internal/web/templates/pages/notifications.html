{{define "content.notifications"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-gradient-to-br from-indigo-600 to-blue-700 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/profile" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Уведомления</h1>
    </div>
    <p class="text-blue-100 text-sm">Все сообщения и напоминания</p>
  </div>

  <div class="p-4 space-y-3">
    {{range .Notifications}}
    <div class="bg-white rounded-2xl p-4 shadow-sm {{if not .Read}}border-l-4 border-blue-600{{end}}">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h4 class="mb-1">{{.Title}}</h4>
          <p class="text-sm text-gray-600">{{.Message}}</p>
          <div class="text-xs text-gray-400 mt-2">{{.Created}}</div>
        </div>
        {{if not .Read}}
        <form method="POST" action="/notifications/read">
          <input type="hidden" name="id" value="{{.ID}}" />
          <button class="text-xs text-blue-600">Отметить</button>
        </form>
        {{end}}
      </div>
    </div>
    {{end}}
  </div>
</div>
{{end}}
