{{define "content.nutrition"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-gradient-to-br from-green-600 to-emerald-600 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Питание</h1>
    </div>
    <p class="text-green-100 text-sm">Рекомендации по рациону</p>
  </div>

  <div class="p-4 space-y-4">
    <form method="GET" action="/nutrition" class="bg-white rounded-2xl p-4 shadow-sm">
      <label class="text-xs text-gray-500" for="category">Категория</label>
      <input id="category" name="category" value="{{.Category}}" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Завтрак, Обед" />
      <button class="w-full mt-3 bg-green-600 text-white py-2 rounded-xl">Применить</button>
    </form>

    <div class="space-y-3">
      {{range .Items}}
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="mb-1">{{.Title}}</h3>
            <p class="text-sm text-gray-600">{{.Description}}</p>
            <div class="text-xs text-gray-500 mt-2">{{.Category}}</div>
          </div>
          <div class="text-green-600 text-sm">{{.Calories}} ккал</div>
        </div>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
