{{define "content.onboarding"}}
<div class="min-h-screen bg-white flex flex-col">
  <div class="p-4 flex justify-end">
    <form method="POST" action="/onboarding/skip">
      <button class="text-gray-600 text-sm px-4 py-2 hover:text-gray-900" type="submit">Пропустить</button>
    </form>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center p-6">
    <div class="w-32 h-32 rounded-full bg-gradient-to-br {{.Slide.Color}} flex items-center justify-center text-6xl mb-8 shadow-lg">
      {{.Slide.Icon}}
    </div>

    <h1 class="text-center mb-4 px-4">{{.Slide.Title}}</h1>
    <p class="text-center text-gray-600 px-8 max-w-md">{{.Slide.Description}}</p>
  </div>

  <div class="p-6 space-y-4">
    <div class="flex justify-center gap-2">
      {{range $index, $item := .Slides}}
        <a href="/onboarding?slide={{$index}}" class="transition-all {{if eq $.SlideIndex $index}}w-8 h-2 bg-blue-600 rounded-full{{else}}w-2 h-2 bg-gray-300 rounded-full{{end}}"></a>
      {{end}}
    </div>

    <form method="POST" action="/onboarding/next">
      <input type="hidden" name="slide" value="{{.SlideIndex}}" />
      <button class="w-full bg-blue-600 text-white py-4 rounded-xl flex items-center justify-center gap-2" type="submit">
        {{if .IsLast}}
          Начать
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />
          </svg>
        {{else}}
          Далее
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />
          </svg>
        {{end}}
      </button>
    </form>

    <div class="flex items-center justify-center gap-2 text-sm text-gray-500">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      <span>ГК РОСАТОМ</span>
    </div>
  </div>
</div>
{{end}}
