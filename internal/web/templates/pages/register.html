{{define "content.register"}}
<div class="min-h-screen bg-gradient-to-b from-blue-600 to-blue-800 flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="bg-white w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h1 class="text-white text-3xl mb-2">Регистрация</h1>
      <p class="text-blue-200">Создайте учетную запись</p>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl">
      <form method="POST" action="/register" class="space-y-4">
        <div>
          <label class="block text-gray-700 mb-2" for="name">Полное имя</label>
          <input id="name" name="name" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Иван Петров" required />
        </div>
        <div>
          <label class="block text-gray-700 mb-2" for="employee_id">Табельный номер</label>
          <input id="employee_id" name="employee_id" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="123456" required />
        </div>
        <div>
          <label class="block text-gray-700 mb-2" for="department">Отдел</label>
          <input id="department" name="department" type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Инженерный отдел" />
        </div>
        <div>
          <label class="block text-gray-700 mb-2" for="password">Пароль</label>
          <input id="password" name="password" type="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••" required />
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition-colors">Создать аккаунт</button>
      </form>

      <div class="mt-6 text-center text-gray-500 text-sm">
        Уже есть аккаунт?
        <a class="text-blue-600 hover:underline" href="/login">Войти</a>
      </div>
    </div>
  </div>
</div>
{{end}}
