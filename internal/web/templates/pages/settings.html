{{define "content.settings"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-gradient-to-br from-gray-700 to-gray-900 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/profile" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Настройки</h1>
    </div>
    <p class="text-gray-300 text-sm">Персонализируйте приложение</p>
  </div>

  <div class="p-4 space-y-4">
    <form method="POST" action="/settings" class="bg-white rounded-2xl p-5 shadow-sm space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm">Уведомления</div>
          <div class="text-xs text-gray-500">Получать уведомления и напоминания</div>
        </div>
        <input type="checkbox" name="notifications" class="h-5 w-5" {{if .Notifications}}checked{{end}} />
      </div>
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm">Напоминания</div>
          <div class="text-xs text-gray-500">Напоминать о тренировках</div>
        </div>
        <input type="checkbox" name="reminders" class="h-5 w-5" {{if .Reminders}}checked{{end}} />
      </div>
      <div>
        <label class="text-xs text-gray-500" for="language">Язык</label>
        <select id="language" name="language" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200">
          <option value="ru" {{if eq .Language "ru"}}selected{{end}}>Русский</option>
          <option value="en" {{if eq .Language "en"}}selected{{end}}>English</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-500" for="theme">Тема</label>
        <select id="theme" name="theme" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200">
          <option value="light" {{if eq .Theme "light"}}selected{{end}}>Светлая</option>
          <option value="dark" {{if eq .Theme "dark"}}selected{{end}}>Темная</option>
        </select>
      </div>
      <button class="w-full bg-gray-900 text-white py-3 rounded-xl">Сохранить</button>
    </form>

    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h3 class="mb-3">Безопасность</h3>
      <div class="space-y-3 text-sm text-gray-600">
        <div>Данные защищены и доступны только вам и руководителям.</div>
        <div>Пароль можно сменить через HR отдел.</div>
      </div>
    </div>
  </div>
</div>
{{end}}
