{{define "content.support"}}
<div class="min-h-screen bg-gray-50 pb-20">
  <div class="bg-gradient-to-br from-green-600 to-teal-600 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/settings" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Помощь и поддержка</h1>
    </div>
    <p class="text-green-100 text-sm">Ответы на вопросы и контакты</p>
  </div>

  <div class="p-4 space-y-4">
    <div class="grid grid-cols-2 gap-3">
      <a href="#contact" class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow text-center">
        <div class="bg-blue-100 w-12 h-12 rounded-xl flex items-center justify-center mb-3 mx-auto">
          <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <div class="text-sm">Написать нам</div>
      </a>
      <a href="tel:88001234567" class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow text-center">
        <div class="bg-green-100 w-12 h-12 rounded-xl flex items-center justify-center mb-3 mx-auto">
          <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <div class="text-sm">Позвонить</div>
      </a>
    </div>

    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h3 class="mb-4">Часто задаваемые вопросы</h3>
      <div class="flex gap-2 overflow-x-auto pb-2 mb-4 -mx-2 px-2">
        {{range .Categories}}
        <a href="/support?category={{.}}" class="px-4 py-2 rounded-full whitespace-nowrap text-sm transition-colors {{if eq $.Category .}}bg-green-600 text-white{{else}}bg-gray-100 text-gray-700{{end}}">{{.}}</a>
        {{end}}
      </div>
      <div class="space-y-2">
        {{range .FAQ}}
        <details class="border border-gray-200 rounded-xl overflow-hidden">
          <summary class="w-full p-4 flex items-start justify-between hover:bg-gray-50 transition-colors cursor-pointer">
            <div class="text-left flex-1">
              <span class="text-xs text-green-600 mb-1 block">{{.Category}}</span>
              <h4 class="text-sm">{{.Question}}</h4>
            </div>
          </summary>
          <div class="px-4 pb-4 text-sm text-gray-600 border-t border-gray-100 pt-3">{{.Answer}}</div>
        </details>
        {{end}}
      </div>
    </div>

    <div id="contact" class="bg-white rounded-2xl p-5 shadow-sm">
      <h3 class="mb-4">Связаться с нами</h3>
      <form method="POST" action="/support" class="space-y-3">
        <div>
          <label class="text-xs text-gray-500" for="category">Категория</label>
          <input id="category" name="category" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Тренировки, Приложение" />
        </div>
        <div>
          <label class="text-xs text-gray-500" for="subject">Тема</label>
          <input id="subject" name="subject" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Короткое описание вопроса" />
        </div>
        <div>
          <label class="text-xs text-gray-500" for="message">Сообщение</label>
          <textarea id="message" name="message" rows="4" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Опишите проблему"></textarea>
        </div>
        <button class="w-full bg-green-600 text-white py-3 rounded-xl">Отправить</button>
      </form>
    </div>
  </div>
</div>
{{end}}
