{{define "content.video_tutorials"}}
<div class="min-h-screen bg-gray-50">
  <div class="bg-gradient-to-br from-red-600 to-orange-600 text-white p-6">
    <div class="flex items-center gap-4 mb-2">
      <a href="/" class="p-2 -ml-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1>Видео уроки</h1>
    </div>
    <p class="text-red-100 text-sm">Библиотека обучающих видео</p>
  </div>

  <div class="p-4 space-y-4">
    <form method="GET" action="/videos" class="bg-white rounded-2xl p-4 shadow-sm space-y-3">
      <div>
        <label class="text-xs text-gray-500" for="q">Поиск</label>
        <input id="q" name="q" value="{{.Query}}" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Название видео" />
      </div>
      <div>
        <label class="text-xs text-gray-500" for="category">Категория</label>
        <input id="category" name="category" value="{{.Category}}" class="mt-1 w-full px-3 py-2 rounded-lg border border-gray-200" placeholder="Спина, Растяжка" />
      </div>
      <button class="w-full bg-red-600 text-white py-2 rounded-xl">Применить</button>
    </form>

    <div class="space-y-3">
      {{range .Videos}}
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-center gap-4">
          <div class="bg-red-100 rounded-xl w-16 h-16 flex items-center justify-center">
            <svg class="w-8 h-8 text-red-600" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
          </div>
          <div class="flex-1">
            <h3 class="mb-1">{{.Title}}</h3>
            <p class="text-sm text-gray-600">{{.Description}}</p>
            <div class="text-xs text-gray-500 mt-2">{{.Duration}} мин • {{.Category}}</div>
          </div>
        </div>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
